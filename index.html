<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnicería</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#b71c1c;color:white;padding:10px;text-align:center;}
#banner{display:none;color:white;padding:10px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;padding:10px;}
.card{background:white;padding:10px;border-radius:10px;}
img{width:100%;height:150px;object-fit:cover;}
.carrito{position:fixed;bottom:0;background:white;width:100%;padding:10px;}
</style>
</head>

<body>

<header><h1>🥩 Carnicería</h1></header>
<div id="banner"></div>

<select id="pago">
<option value="ninguna">Forma de pago</option>
<option value="transferencia">Transferencia</option>
</select>

<div class="grid" id="contenedor"></div>

<div class="carrito">
<ul id="lista"></ul>
<p id="total"></p>
<button onclick="enviar()">Enviar Pedido</button>
</div>

<script>
let productos=[],ofertasGenerales=[],carrito=[],formaPago="ninguna";

fetch('productos.json')
.then(r=>r.json())
.then(data=>{
  productos=data.productos.filter(p=>p.activo===1);
  ofertasGenerales=data.ofertas_generales||[];

  if(data.config?.banner_ofertas?.activo){
    const b=document.getElementById('banner');
    b.style.display='block';
    b.style.background=data.config.banner_ofertas.color;
    b.innerText=data.config.banner_ofertas.titulo;
  }

  render();
});

document.getElementById('pago').onchange=e=>{
  formaPago=e.target.value;
  render();
};

function calcular(p){
  const hoy=new Date().toISOString().split('T')[0];
  let precio=p.precio;

  if(p.oferta && p.oferta_inicio && p.oferta_fin){
    if(hoy>=p.oferta_inicio && hoy<=p.oferta_fin){
      precio*= (1-p.oferta/100);
    }
  }

  ofertasGenerales.forEach(o=>{
    if(o.tipo==='pago' && o.forma_pago===formaPago){
      precio*= (1-o.descuento/100);
    }
  });

  return Math.round(precio);
}

function render(){
  const c=document.getElementById('contenedor');
  c.innerHTML='';

  productos.forEach(p=>{
    const precio=calcular(p);
    const div=document.createElement('div');

    div.className='card';
    div.innerHTML=`
    <img src="${p.foto}">
    <h4>${p.emoji} ${p.nombre}</h4>
    <p>${precio < p.precio ? `<del>$${p.precio}</del> $${precio}` : `$${precio}`}</p>
    <button onclick="add(${p.id})">Agregar</button>
    `;

    c.appendChild(div);
  });
}

function add(id){
  const p=productos.find(x=>x.id===id);
  const item=carrito.find(x=>x.id===id);

  if(item){ item.cantidad++; }
  else{ carrito.push({...p,cantidad:1}); }

  actualizar();
}

function actualizar(){
  let total=0;
  const ul=document.getElementById('lista');
  ul.innerHTML='';

  carrito.forEach(p=>{
    const precio=calcular(p);
    total+=precio*p.cantidad;

    const li=document.createElement('li');
    li.textContent=`${p.nombre} x${p.cantidad} - $${precio*p.cantidad}`;
    ul.appendChild(li);
  });

  document.getElementById('total').innerText="Total: $"+total;
}

function enviar(){

  const pedido={
    fecha:new Date().toISOString(),
    items:carrito,
    total:carrito.reduce((a,p)=>a+calcular(p)*p.cantidad,0),
    formaPago:formaPago
  };

  let pedidos=JSON.parse(localStorage.getItem('pedidos'))||[];
  pedidos.push(pedido);
  localStorage.setItem('pedidos',JSON.stringify(pedidos));

  alert("Pedido guardado ✔");

  carrito=[];
  actualizar();
}
</script>

</body>
</html>
