<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carnicería El Mono — Calidad que se nota</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --rojo:#B71C1C;
  --rojo-med:#C62828;
  --rojo-light:#FFEBEE;
  --verde:#1B5E20;
  --verde-med:#2E7D32;
  --crema:#FDF8F0;
  --cafe:#4E342E;
  --cafe-light:#EFEBE9;
  --texto:#1A0A00;
  --muted:#795548;
  --borde:rgba(78,52,46,0.12);
  --blanco:#fff;
  --sombra:0 2px 16px rgba(78,52,46,0.10);
}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--crema);
  color:var(--texto);
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  overflow-x:hidden;
}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen{display:none;flex-direction:column;min-height:100vh;animation:fadeIn .22s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header{
  background:linear-gradient(135deg,var(--verde) 0%,var(--verde-med) 60%,var(--rojo-med) 100%);
  padding:.85rem 1.1rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.18);
}
.header-left{display:flex;align-items:center;gap:10px;}
.logo-wrap{width:46px;height:46px;border-radius:50%;border:2.5px solid rgba(255,255,255,.4);overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.1);}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.logo-fb{width:46px;height:46px;border-radius:50%;border:2.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.header-texts{}
.header-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.2px;}
.header-slogan{font-size:9.5px;color:rgba(255,255,255,.65);letter-spacing:1.8px;text-transform:uppercase;margin-top:1px;}
.cart-fab{
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.3);
  border-radius:50px;
  padding:7px 15px;
  color:#fff;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;gap:7px;
  font-family:'DM Sans',sans-serif;
  transition:background .15s;
  white-space:nowrap;
}
.cart-fab:active{background:rgba(255,255,255,.25);}
.cart-badge{
  background:var(--rojo);
  color:#fff;
  border-radius:50%;
  width:19px;height:19px;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,.4);
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero{
  background:linear-gradient(160deg,var(--verde) 0%,var(--rojo-med) 100%);
  padding:1.6rem 1.3rem 2.2rem;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;right:-30px;top:-30px;
  width:160px;height:160px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
}
.hero::after{
  content:'';position:absolute;left:-20px;bottom:-40px;
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.04);
}
.hero-inner{display:flex;align-items:center;gap:1rem;position:relative;z-index:1;}
.hero-logo{width:82px;height:82px;border-radius:50%;border:3px solid rgba(255,255,255,.45);overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.hero-logo img{width:100%;height:100%;object-fit:cover;}
.hero-logo-fb{width:82px;height:82px;border-radius:50%;border:3px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0;}
.hero-copy{}
.hero-tag{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:600;margin-bottom:5px;}
.hero-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:5px;}
.hero-sub{font-size:12.5px;color:rgba(255,255,255,.75);line-height:1.5;font-style:italic;}

/* ═══════════════════════════════════════════
   PILLS CATEGORÍAS
═══════════════════════════════════════════ */
.cats-bar{
  background:var(--blanco);
  border-bottom:1px solid var(--borde);
  padding:.85rem 1.1rem .55rem;
  display:flex;
  gap:7px;
  overflow-x:auto;
  scrollbar-width:none;
  position:sticky;
  top:68px;
  z-index:100;
}
.cats-bar::-webkit-scrollbar{display:none;}
.cat-pill{
  flex-shrink:0;
  background:var(--cafe-light);
  border:1.5px solid var(--borde);
  border-radius:50px;
  padding:5px 14px;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  white-space:nowrap;
  transition:all .15s;
  font-family:'DM Sans',sans-serif;
}
.cat-pill.activa{background:var(--rojo);border-color:var(--rojo);color:#fff;}

/* ═══════════════════════════════════════════
   GRILLA PRODUCTOS
═══════════════════════════════════════════ */
.sec-label{
  font-size:10.5px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);font-weight:700;
  padding:1.2rem 1.1rem .6rem;
  display:flex;align-items:center;gap:7px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--borde);}

.grilla{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:11px;
  padding:0 1.1rem 1.2rem;
}

.prod-card{
  background:var(--blanco);
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--borde);
  cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  box-shadow:var(--sombra);
}
.prod-card:active{transform:scale(.96);box-shadow:none;}

.prod-foto{
  width:100%;height:112px;
  background:var(--rojo-light);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;
  overflow:hidden;
  position:relative;
}
.prod-foto img{width:100%;height:112px;object-fit:cover;display:block;}

.prod-body{padding:10px 10px 13px;}
.prod-nombre{font-weight:700;font-size:13px;color:var(--texto);line-height:1.3;margin-bottom:3px;}
.prod-desc-short{font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:9px;}
.prod-precio{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;
  color:var(--rojo);
}
.prod-unidad{font-size:10px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:500;}

/* ═══════════════════════════════════════════
   DETALLE
═══════════════════════════════════════════ */
.det-header{
  background:linear-gradient(135deg,var(--verde) 0%,var(--rojo-med) 100%);
  padding:.85rem 1.1rem;
  display:flex;align-items:center;gap:11px;
  position:sticky;top:0;z-index:200;
}
.btn-back{
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:50%;
  width:38px;height:38px;
  color:#fff;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'DM Sans',sans-serif;
  transition:background .15s;
}
.btn-back:active{background:rgba(255,255,255,.28);}
.det-header-title{font-family:'Playfair Display',serif;font-size:17px;color:#fff;font-weight:900;}

.det-foto{
  width:100%;height:230px;
  background:var(--rojo-light);
  display:flex;align-items:center;justify-content:center;
  font-size:96px;
  overflow:hidden;
}
.det-foto img{width:100%;height:230px;object-fit:cover;display:block;}

.det-body{padding:1.4rem 1.2rem 2rem;}
.det-cat{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px;}
.det-nombre{font-family:'Playfair Display',serif;font-size:27px;font-weight:900;line-height:1.15;margin-bottom:11px;color:var(--texto);}
.det-desc{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:1.4rem;}
.det-precio-row{display:flex;align-items:baseline;gap:6px;margin-bottom:1.5rem;}
.det-precio{font-family:'Playfair Display',serif;font-size:33px;font-weight:900;color:var(--rojo);}
.det-unidad{font-size:14px;color:var(--muted);}

/* Selector kg */
.qty-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block;}
.qty-row{display:flex;align-items:center;gap:0;border:1.5px solid var(--borde);border-radius:50px;overflow:hidden;width:fit-content;margin-bottom:1.5rem;background:var(--blanco);}
.qty-btn{
  background:var(--cafe-light);border:none;
  width:46px;height:46px;
  font-size:24px;color:var(--rojo);font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;transition:background .12s;
}
.qty-btn:active{background:#D7CCC8;}
.qty-val{font-size:16px;font-weight:700;color:var(--texto);width:74px;text-align:center;}

.btn-agregar{
  width:100%;
  background:linear-gradient(135deg,var(--rojo) 0%,var(--rojo-med) 100%);
  color:#fff;border:none;border-radius:50px;
  padding:16px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 14px rgba(183,28,28,.3);
  transition:transform .12s, box-shadow .12s;
  letter-spacing:.2px;
}
.btn-agregar:active{transform:scale(.97);box-shadow:0 2px 8px rgba(183,28,28,.2);}
.link-seguir{
  display:block;text-align:center;margin-top:14px;
  color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;
}

/* ═══════════════════════════════════════════
   CARRITO
═══════════════════════════════════════════ */
.cart-body{flex:1;padding:1rem 1.1rem;overflow-y:auto;}
.cart-empty{
  text-align:center;padding:3.5rem 1rem;color:var(--muted);
}
.cart-empty-icon{font-size:56px;display:block;margin-bottom:14px;}
.cart-empty-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--texto);}

.cart-item{
  display:flex;align-items:center;gap:11px;
  background:var(--blanco);border-radius:13px;
  padding:12px;margin-bottom:9px;
  border:1px solid var(--borde);
  box-shadow:0 1px 6px rgba(78,52,46,.06);
}
.cart-thumb{
  width:46px;height:46px;border-radius:9px;
  background:var(--rojo-light);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;overflow:hidden;
}
.cart-thumb img{width:46px;height:46px;object-fit:cover;border-radius:9px;}
.cart-info{flex:1;min-width:0;}
.cart-nombre{font-weight:700;font-size:14px;color:var(--texto);}
.cart-detalle{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-quitar{
  background:var(--rojo-light);border:none;border-radius:50%;
  width:30px;height:30px;
  color:var(--rojo);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;transition:background .12s;
  flex-shrink:0;
}
.btn-quitar:active{background:#FFCDD2;}

.cart-footer{
  background:var(--blanco);
  border-top:1px solid var(--borde);
  padding:1.2rem 1.2rem 1.6rem;
  box-shadow:0 -2px 12px rgba(78,52,46,.06);
}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.total-label{font-size:13px;color:var(--muted);font-weight:500;}
.total-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--rojo);}
.total-nota{font-size:10.5px;color:var(--muted);margin-top:2px;}

.btn-wa{
  width:100%;
  background:linear-gradient(135deg,#1B8C3E 0%,#25D366 100%);
  color:#fff;border:none;border-radius:50px;
  padding:17px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 14px rgba(37,211,102,.3);
  transition:transform .12s;
}
.btn-wa:active{transform:scale(.97);}
.btn-wa-icon{font-size:20px;}
.link-seguir-carrito{
  display:block;text-align:center;margin-top:13px;
  color:var(--muted);font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;
}

/* ═══════════════════════════════════════════
   LOADING & ESTADO
═══════════════════════════════════════════ */
.loading-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:2rem;color:var(--muted);
}
.spinner{
  width:36px;height:36px;
  border:3px solid var(--borde);
  border-top-color:var(--rojo);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:#1A3C34;color:#fff;
  padding:10px 22px;border-radius:50px;
  font-size:13px;font-weight:600;
  opacity:0;transition:all .28s;
  pointer-events:none;white-space:nowrap;z-index:999;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════════════
   CONTENIDO PRINCIPAL SCROLLABLE
═══════════════════════════════════════════ */
.main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════
     PANTALLA PRINCIPAL
══════════════════════════════════════════ -->
<div class="screen active" id="screen-main">

  <div class="header">
    <div class="header-left">
      <div id="hdr-logo-wrap">
        <div class="logo-fb" id="hdr-logo-fb">🐒</div>
      </div>
      <div class="header-texts">
        <div class="header-slogan" id="hdr-slogan">Calidad que se nota</div>
        <div class="header-brand" id="hdr-brand">El Mono</div>
      </div>
    </div>
    <button class="cart-fab" onclick="goCarrito()">
      🛒 <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>

  <div class="main-scroll" id="main-scroll">

    <div class="hero">
      <div class="hero-inner">
        <div id="hero-logo-wrap">
          <div class="hero-logo-fb" id="hero-logo-fb">🐒</div>
        </div>
        <div class="hero-copy">
          <div class="hero-tag">Córdoba · Cortes frescos</div>
          <div class="hero-title" id="hero-title">Carnicería El Mono</div>
          <div class="hero-sub" id="hero-sub">"Calidad que se nota"</div>
        </div>
      </div>
    </div>

    <div class="cats-bar" id="cats-bar">
      <div class="cat-pill activa" data-cat="all" onclick="filtrarCat(this,'all')">Todos</div>
    </div>

    <div id="productos-wrap">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <span>Cargando productos...</span>
      </div>
    </div>

  </div><!-- /main-scroll -->
</div>

<!-- ══════════════════════════════════════════
     PANTALLA DETALLE
══════════════════════════════════════════ -->
<div class="screen" id="screen-det">
  <div class="det-header">
    <button class="btn-back" onclick="goMain()">&#8592;</button>
    <div class="det-header-title">Detalle del producto</div>
  </div>
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;">
    <div class="det-foto" id="det-foto"></div>
    <div class="det-body">
      <div class="det-cat" id="det-cat"></div>
      <div class="det-nombre" id="det-nombre"></div>
      <div class="det-desc" id="det-desc"></div>
      <div class="det-precio-row">
        <div class="det-precio" id="det-precio"></div>
        <div class="det-unidad">/ kg</div>
      </div>
      <span class="qty-label">Cantidad (kg)</span>
      <div class="qty-row">
        <button class="qty-btn" onclick="cambiarQty(-.5)">−</button>
        <div class="qty-val" id="qty-val">0.5 kg</div>
        <button class="qty-btn" onclick="cambiarQty(.5)">+</button>
      </div>
      <button class="btn-agregar" onclick="agregarAlCarrito()">Agregar al carrito</button>
      <span class="link-seguir" onclick="goMain()">← Seguir comprando</span>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PANTALLA CARRITO
══════════════════════════════════════════ -->
<div class="screen" id="screen-cart">
  <div class="header">
    <div class="header-left">
      <div id="cart-logo-wrap">
        <div class="logo-fb">🐒</div>
      </div>
      <div class="header-texts">
        <div class="header-slogan">Tu pedido</div>
        <div class="header-brand">Carrito</div>
      </div>
    </div>
    <button class="cart-fab" onclick="goMain()" style="font-size:12px;padding:7px 12px;">← Volver</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-footer">
    <div class="total-row">
      <div>
        <div class="total-label">Total estimado</div>
        <div class="total-nota">Los precios son por kg</div>
      </div>
      <div class="total-val" id="cart-total">$0</div>
    </div>
    <button class="btn-wa" onclick="enviarWA()">
      <span class="btn-wa-icon">💬</span> Finalizar por WhatsApp
    </button>
    <span class="link-seguir-carrito" onclick="goMain()">← Seguir comprando</span>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIGURACIÓN — solo cambiá esta línea
══════════════════════════════════════════ */
const PRODUCTOS_URL = 'productos.json';
/* Ejemplo producción:
   const PRODUCTOS_URL = 'https://tuusuario.github.io/carniceria/productos.json'; */

/* ══════════════════════════════════════════
   CONSTANTES
══════════════════════════════════════════ */
const CAT_LABEL = {vacuno:'Vacuno',cerdo:'Cerdo',pollo:'Pollo',achuras:'Achuras',embutidos:'Embutidos',preparado:'Preparados'};
const CAT_EMOJI = {vacuno:'🐄',cerdo:'🐷',pollo:'🍗',achuras:'🔥',embutidos:'🌭',preparado:'🍽️'};

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
let productos = [];
let negocio   = {};
let carrito   = [];
let catActual = 'all';
let prodActual = null;
let qtyActual  = 0.5;

/* ══════════════════════════════════════════
   DATOS DEMO (fallback cuando no hay servidor)
══════════════════════════════════════════ */
const DATOS_DEMO = {
  negocio: {

    whatsapp: "5493516000000",
    logo: ""
  },
  productos: [
    { id:1,  nombre:"Asado de tira",       descripcion:"Corte clásico argentino con hueso, ideal para la parrilla. Jugoso y tierno, de primera calidad. Perfecto para asados familiares.", categoria:"vacuno",    precio:3200, foto:"", emoji:"🥩", activo:1 },
    { id:2,  nombre:"Bife de chorizo",      descripcion:"El rey de la parrilla argentina. Corte grueso y tierno con grasa marmolada. Mínimo 2 cm de grosor.",                              categoria:"vacuno",    precio:4800, foto:"", emoji:"🍖", activo:1 },

};

/* ══════════════════════════════════════════
   INICIALIZACIÓN
══════════════════════════════════════════ */
function cargarDatos(data) {
  negocio   = data.negocio || {};
  productos = (data.productos || []).filter(function(p){ return p.activo === 1; });
  aplicarNegocio();
  construirCats();
  renderGrilla();
}

function init() {
  fetch(PRODUCTOS_URL)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      cargarDatos(data);
    })
    .catch(function() {
      cargarDatos(DATOS_DEMO);
    });
}

/* ══════════════════════════════════════════
   APLICAR DATOS DEL NEGOCIO
══════════════════════════════════════════ */
function aplicarNegocio() {
  if (!negocio.nombre) return;
  const short = negocio.nombre.replace(/carnicer[íi]a\s*/i,'');
  document.getElementById('hdr-brand').textContent   = short;
  document.getElementById('hdr-slogan').textContent  = negocio.slogan || '';
  document.getElementById('hero-title').textContent  = negocio.nombre;
  document.getElementById('hero-sub').textContent    = `"${negocio.slogan || ''}"`;
  document.title = negocio.nombre + ' — ' + (negocio.slogan || '');

  if (negocio.logo) {
    const logoHTML = `<div class="logo-wrap"><img src="${negocio.logo}" alt="logo" onerror="this.parentElement.outerHTML='<div class=logo-fb>🐒</div>'"></div>`;
    const heroHTML = `<div class="hero-logo"><img src="${negocio.logo}" alt="logo" onerror="this.parentElement.outerHTML='<div class=hero-logo-fb>🐒</div>'"></div>`;
    document.getElementById('hdr-logo-wrap').innerHTML  = logoHTML;
    document.getElementById('hero-logo-wrap').innerHTML = heroHTML;
    document.getElementById('hdr-logo-fb').style.display  = 'none';
    document.getElementById('hero-logo-fb').style.display = 'none';
  }
}

/* ══════════════════════════════════════════
   CATEGORÍAS
══════════════════════════════════════════ */
function construirCats() {
  const cats = [...new Set(productos.map(p => p.categoria))];
  const bar  = document.getElementById('cats-bar');
  let html = `<div class="cat-pill activa" data-cat="all" onclick="filtrarCat(this,'all')">Todos</div>`;
  cats.forEach(c => {
    const lbl = CAT_LABEL[c] || c;
    const em  = CAT_EMOJI[c] || '';
    html += `<div class="cat-pill" data-cat="${c}" onclick="filtrarCat(this,'${c}')">${em} ${lbl}</div>`;
  });
  bar.innerHTML = html;
}

function filtrarCat(el, cat) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('activa'));
  el.classList.add('activa');
  catActual = cat;
  renderGrilla();
  document.getElementById('main-scroll').scrollTo({top:0,behavior:'smooth'});
}

/* ══════════════════════════════════════════
   GRILLA
══════════════════════════════════════════ */
function fotoEl(p, wh) {
  if (p.foto) {
    const em = (p.emoji || CAT_EMOJI[p.categoria] || '🥩').replace(/'/g,"\\'");
    return `<img src="${p.foto}" alt="${escH(p.nombre)}"
              onerror="this.parentElement.innerHTML='<span style=font-size:${Math.round(wh*.44)}px>${em}</span>'">`;
  }
  return `<span style="font-size:${Math.round(wh*.44)}px;">${p.emoji || CAT_EMOJI[p.categoria] || '🥩'}</span>`;
}

function renderGrilla() {
  const filtrados = catActual === 'all' ? productos : productos.filter(p => p.categoria === catActual);
  const cats      = [...new Set(filtrados.map(p => p.categoria))];
  const wrap      = document.getElementById('productos-wrap');

  if (!filtrados.length) {
    wrap.innerHTML = `<div class="loading-wrap"><span style="font-size:36px;">🔍</span><span>No hay productos en esta categoría.</span></div>`;
    return;
  }

  let html = '';
  cats.forEach(cat => {
    const items = filtrados.filter(p => p.categoria === cat);
    html += `<div class="sec-label">${CAT_EMOJI[cat]||''} ${CAT_LABEL[cat]||cat}</div>
             <div class="grilla">`;
    items.forEach(p => {
      html += `<div class="prod-card" onclick="goDetalle(${p.id})">
        <div class="prod-foto">${fotoEl(p, 112)}</div>
        <div class="prod-body">
          <div class="prod-nombre">${escH(p.nombre)}</div>
          <div class="prod-desc-short">${escH((p.descripcion||'').substring(0,52))}…</div>
          <div class="prod-precio">$${(p.precio||0).toLocaleString('es-AR')} <span class="prod-unidad">/kg</span></div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  wrap.innerHTML = html;
}

/* ══════════════════════════════════════════
   DETALLE
══════════════════════════════════════════ */
function goDetalle(id) {
  prodActual = productos.find(p => p.id === id);
  if (!prodActual) return;
  qtyActual = 0.5;

  const em = prodActual.emoji || CAT_EMOJI[prodActual.categoria] || '🥩';
  const fotoWrap = document.getElementById('det-foto');
  fotoWrap.innerHTML = prodActual.foto
    ? `<img src="${prodActual.foto}" alt="${escH(prodActual.nombre)}"
         onerror="this.parentElement.innerHTML='<span style=font-size:96px>${em}</span>'">`
    : `<span style="font-size:96px;">${em}</span>`;

  document.getElementById('det-cat').textContent    = CAT_LABEL[prodActual.categoria] || prodActual.categoria;
  document.getElementById('det-nombre').textContent = prodActual.nombre;
  document.getElementById('det-desc').textContent   = prodActual.descripcion || '';
  document.getElementById('det-precio').textContent = '$' + (prodActual.precio||0).toLocaleString('es-AR');
  document.getElementById('qty-val').textContent    = '0.5 kg';

  mostrarScreen('screen-det');
}

function cambiarQty(delta) {
  qtyActual = Math.max(0.5, Math.round((qtyActual + delta) * 10) / 10);
  document.getElementById('qty-val').textContent = qtyActual.toFixed(1) + ' kg';
}

function agregarAlCarrito() {
  if (!prodActual) return;
  const ex = carrito.find(i => i.id === prodActual.id);
  if (ex) {
    ex.qty = Math.round((ex.qty + qtyActual) * 10) / 10;
  } else {
    carrito.push({
      id:    prodActual.id,
      nombre:prodActual.nombre,
      precio:prodActual.precio,
      foto:  prodActual.foto  || null,
      emoji: prodActual.emoji || CAT_EMOJI[prodActual.categoria] || '🥩',
      qty:   qtyActual
    });
  }
  actualizarBadge();
  toast(`✓ ${prodActual.nombre} agregado`);
  setTimeout(goMain, 900);
}

/* ══════════════════════════════════════════
   CARRITO
══════════════════════════════════════════ */
function goCarrito() {
  renderCarrito();
  mostrarScreen('screen-cart');
}

function renderCarrito() {
  const body = document.getElementById('cart-body');
  if (!carrito.length) {
    body.innerHTML = `<div class="cart-empty">
      <span class="cart-empty-icon">🛒</span>
      <div class="cart-empty-title">Carrito vacío</div>
      <span style="font-size:13px;">Agregá productos para hacer tu pedido</span>
    </div>`;
    document.getElementById('cart-total').textContent = '$0';
    return;
  }
  let html = '', total = 0;
  carrito.forEach(item => {
    const sub = item.precio * item.qty;
    total += sub;
    const thumb = item.foto
      ? `<img src="${item.foto}" alt="${escH(item.nombre)}" onerror="this.parentElement.innerHTML='${item.emoji}'">`
      : item.emoji;
    html += `<div class="cart-item">
      <div class="cart-thumb">${thumb}</div>
      <div class="cart-info">
        <div class="cart-nombre">${escH(item.nombre)}</div>
        <div class="cart-detalle">${item.qty.toFixed(1)} kg · $${sub.toLocaleString('es-AR')}</div>
      </div>
      <button class="btn-quitar" onclick="quitarItem(${item.id})">✕</button>
    </div>`;
  });
  body.innerHTML = html;
  document.getElementById('cart-total').textContent = '$' + total.toLocaleString('es-AR');
}

function quitarItem(id) {
  carrito = carrito.filter(i => i.id !== id);
  actualizarBadge();
  renderCarrito();
}

function actualizarBadge() {
  document.getElementById('cart-badge').textContent = carrito.length;
}

/* ══════════════════════════════════════════
   WHATSAPP
══════════════════════════════════════════ */
function enviarWA() {
  if (!carrito.length) { toast('¡Agregá productos primero!'); return; }
  const nombre = negocio.nombre || 'Carnicería El Mono';
  const slogan = negocio.slogan || 'Calidad que se nota';
  let msg = `🐒 *PEDIDO — ${nombre}*\n_${slogan}_\n`;
  msg += '━━━━━━━━━━━━━━━━━━━━\n';
  let total = 0;
  carrito.forEach(i => {
    const sub = i.precio * i.qty;
    total += sub;
    msg += `• ${i.emoji} *${i.nombre}*: ${i.qty.toFixed(1)} kg → $${sub.toLocaleString('es-AR')}\n`;
  });
  msg += '━━━━━━━━━━━━━━━━━━━━\n';
  msg += `💰 *Total estimado: $${total.toLocaleString('es-AR')}*\n\n`;
  msg += '¡Hola! Quisiera hacer este pedido. Por favor confirmame disponibilidad y acordamos la entrega. ¡Muchas gracias! 🙏';
  const wa  = (negocio.whatsapp || '').replace(/\D/g,'');
  const url = `https://wa.me/${wa}?text=` + encodeURIComponent(msg);
  window.open(url, '_blank');
}

/* ══════════════════════════════════════════
   NAVEGACIÓN
══════════════════════════════════════════ */
function mostrarScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goMain()    { mostrarScreen('screen-main'); }


/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ══════════════════════════════════════════
   ARRANCAR
══════════════════════════════════════════ */
init();
</script>

</html>
